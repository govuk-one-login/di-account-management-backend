version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
      time: "03:00"
      timezone: "Europe/London"
    cooldown:
      default-days: 7
    target-branch: main
    labels:
      - dependabot
      - dependencies
    ignore:
      - dependency-name: "node"
        versions: ["17.x", "18.x", "19.x"]
      # Exclude major version updates - next major version has incompatible license
      - dependency-name: "ua-parser-js"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: BAU
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
      time: "03:00"
      timezone: "Europe/London"
    cooldown:
      default-days: 7
    target-branch: main
    labels:
      - dependabot
      - dependencies
    commit-message:
      prefix: BAU

  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
      time: "03:00"
      timezone: "Europe/London"
    cooldown:
      default-days: 7
    labels:
      - dependabot
      - dependencies
    commit-message:
      prefix: BAU
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pre-commit"
    directories:
      - "/"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
      time: "03:00"
      timezone: "Europe/London"
    cooldown:
      default-days: 7
    labels:
      - dependabot
      - dependencies
    commit-message:
      prefix: BAU
    groups:
      pre-commit-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: pip
    directories:
      - "/**"
    exclude-paths:
      - "submodules/**"
    schedule:
      interval: "cron"
      cronjob: "0 3 1,15 * *"
      time: "03:00"
      timezone: "Europe/London"
    cooldown:
      default-days: 7
    labels:
      - dependabot
      - dependencies
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
