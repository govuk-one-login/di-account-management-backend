name: "Verify & Publish to Demo"

# This pipeline deploys work-in-progress branches for demos
# checkov:skip=CKV_GHA_7:workflow_dispatch inputs are required to select the branch/tag to deploy
on:
  workflow_dispatch:
    inputs:
      refType:
        type: choice
        description: "Find branch name, commit SHA, or tag?"
        options:
          - Branch name
          - Commit SHA
          - Tag
        default: Branch name
      gitRef:
        description: "Input branch name, commit SHA, or tag"
        required: true
        type: string
        default: main

permissions:
  contents: read

jobs:
  lint_infrastructure:
    name: Lint Infrastructure
    uses: ./.github/workflows/lint-cloudformation.yaml
    with:
      gitRef: ${{ inputs.gitRef }}

  test_application:
    name: Test Lambdas
    uses: ./.github/workflows/lint-and-test-lambdas.yaml
    with:
      gitRef: ${{ inputs.gitRef }}

  deploy_to_demo:
    environment: Demo-test
    permissions:
      contents: read
      id-token: write
    name: "Deploy to Demo"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - lint_infrastructure
      - test_application
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fill in backup wrapping key
        run: .github/workflows/find-and-replace-backup-wrapping-key.sh
        env:
          WRAPPING_KEY_ARN: ${{ secrets.WRAPPING_KEY_ARN }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v3
        with:
          node-version-file: ".nvmrc"

      - name: Install ESbuild
        run: npm install -g esbuild@0.23.1

      - name: Set up Python 3.9
        uses: actions/setup-python@d27e3f3d7c64b4bbf8e4abfb9b63b83e846e0435 # pin@v4
        with:
          python-version: "3.9"

      - name: Set up SAM cli
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # pin@v2

      - name: sam fix https://github.com/aws/aws-sam-cli/issues/4527
        run: $(dirname $(readlink $(which sam)))/pip install --force-reinstall "cryptography==38.0.4"

      - name: Set up AWS creds
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # pin@v1-node16
        with:
          role-to-assume: ${{ secrets.DEMO_GH_ACTIONS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: SAM validate
        run: sam validate

      - name: SAM build
        run: sam build --manifest package.json

      - name: Deploy SAM app
        uses: govuk-one-login/devplatform-upload-action@64e46134b4108ebfa1cf2a64fee00782f8e2e8cf # pin@v3
        with:
          artifact-bucket-name: ${{ secrets.DEMO_ARTIFACT_BUCKET_NAME }}
          signing-profile-name: ${{ secrets.DEMO_SIGNING_PROFILE_NAME }}
          template-file: .aws-sam/build/template.yaml
