AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "A template to create the GOV.UK One login Account backend infrastructure"

Parameters:
  UserServicesStoreTableName:
    Type: String
    Default: user_services
  RawEventsStoreTableName:
    Type: String
    Default: raw_events
  ActivityLogsStoreTableName:
    Type: String
    Default: activity_log
  AlertingStackName:
    Description: The name of the stack that defines the Alerting resources
    Type: String
    Default: platform-alerting
  InactveAccountTrackerStoreTableName:
    Type: String
    Default: inactive_account_tracker_store
  UserNotificationsTableName:
    Type: String
    Default: user_notifications
  DummyEventStoreTableName:
    Type: String
    Default: dummy_events
  Environment:
    Description: "The environment type"
    Type: "String"
    AllowedValues:
      - "demo"
      - "dev"
      - "build"
      - "staging"
      - "integration"
      - "production"
    ConstraintDescription: must be dev, build, staging, integration or production
  VpcStackName:
    Description: >
      The name of the stack that defines the VPC in which this container will
      run.
    Type: String
    Default: vpc-enhanced
  CodeSigningConfigArn:
    Type: String
    Description: >
      The ARN of the Code Signing Config to use, provided by the deployment pipeline
    Default: "none"
  PermissionsBoundary:
    Type: String
    Description: >
      The ARN of the permissions boundary to apply to any role created by the template
    Default: "none"
  AccountManagementFrontendStackName:
    Type: String
    Default: account-mgmt-frontend
  TestRoleArn:
    Type: String
    Description: The ARN of the role the post-deploy tests are run from
    Default: "none"
  ProductTagValue:
    Description: Value for the Product Tag
    Type: String
    Default: GOV.UK Sign In
  OwnerTagValue:
    Description: Value for the Owner Tag
    Type: String
    Default: govuk-accounts-tech@digital.cabinet-office.gov.uk
  SourceTagValue:
    Description: Value for the Source Tag
    Type: String
    Default: alphagov/di-account-management-backend/deploy/template.yaml
  SystemTagValue:
    Description: Value for the System Tag
    Type: String
    Default: Accounts
  LambdaDeploymentPreference:
    Description: "Specifies the configuration to enable gradual Lambda deployments"
    Type: String
    Default: "Linear10PercentEvery1Minute"
    AllowedValues:
      - AllAtOnce
      - Linear10PercentEvery1Minute

Conditions:
  UseCodeSigning:
    Fn::Not:
      - Fn::Equals:
          - !Ref CodeSigningConfigArn
          - "none"

  UsePermissionsBoundary:
    Fn::Not:
      - Fn::Equals:
          - !Ref PermissionsBoundary
          - "none"

  IsNotDevelopmentOrDemo:
    Fn::Not:
      - Fn::Or:
          - Fn::Equals:
              - !Ref Environment
              - "dev"
          - Fn::Equals:
              - !Ref Environment
              - "demo"

  UseInternalEvents: !Or
    - !Equals [!Ref Environment, demo]
    - !Equals [!Ref Environment, dev]
    - !Equals [!Ref Environment, build]

  UseExternalEvents: !Or
    - !Equals [!Ref Environment, staging]
    - !Equals [!Ref Environment, integration]
    - !Equals [!Ref Environment, production]

  ExportLogsToSplunk:
    Fn::Or:
      - !Equals [!Ref Environment, integration]
      - !Equals [!Ref Environment, production]

  GrantTestPermissions:
    Fn::Not:
      - Fn::Equals:
          - !Ref TestRoleArn
          - "none"

  IsProduction: !Equals [!Ref Environment, production]

  IsDevelopment: !Equals [!Ref Environment, dev]

  BackupEnabled: !Or
    - !Equals [!Ref Environment, staging]
    - !Equals [!Ref Environment, integration]
    - !Equals [!Ref Environment, production]

Globals:
  Function:
    Environment:
      Variables:
        AWS_LAMBDA_EXEC_WRAPPER: /opt/dynatrace
        DT_CONNECTION_AUTH_TOKEN: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_AUTH_TOKEN}}"
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_CONNECTION_BASE_URL: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_BASE_URL}}"
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_CLUSTER_ID: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CLUSTER_ID}}"
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_LOG_COLLECTION_AUTH_TOKEN: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_LOG_COLLECTION_AUTH_TOKEN}}"
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_TENANT: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_TENANT}}"
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_OPEN_TELEMETRY_ENABLE_INTEGRATION: "true"
    Architectures: ["arm64"]
    MemorySize: 128
    KmsKeyArn: !GetAtt LambdaKMSKey.Arn
    ReservedConcurrentExecutions: 10
    Runtime: nodejs22.x
    Timeout: 5
    VpcConfig:
      SubnetIds:
        - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdA"
        - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdB"
      SecurityGroupIds:
        - Fn::ImportValue: !Sub ${VpcStackName}-AWSServicesEndpointSecurityGroupId
    CodeSigningConfigArn: !If
      - UseCodeSigning
      - !Ref CodeSigningConfigArn
      - !Ref AWS::NoValue
    PermissionsBoundary: !If
      - UsePermissionsBoundary
      - !Ref PermissionsBoundary
      - !Ref AWS::NoValue
    Layers:
      - arn:aws:lambda:eu-west-2:216552277552:layer:Dynatrace_OneAgent_1_313_2_20250404-043044_with_collector_nodejs:1
    AutoPublishAlias: live
    DeploymentPreference:
      Type: !Ref LambdaDeploymentPreference
      Role: !GetAtt CodeDeployServiceRole.Arn

