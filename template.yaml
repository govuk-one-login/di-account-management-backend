            Action:
              - dynamodb:DeleteItem
            Resource:
              - !GetAtt UserNotificationsStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource:
              - !GetAtt DatabaseKmsKey.Arn
          - Effect: Allow
            Action:
              - kms:GenerateDataKey*
            Resource:
              - !GetAtt QueueKmsKey.Arn

