      LogGroupName: !Ref UpdateInactiveAccountTrackerFunctionLogGroup
      MetricTransformations:
        - MetricName: AuthEventTriggeredOnAlreadyDeletingAccountCount
          MetricNamespace: !Ref SystemTagValue
          MetricValue: 1
          Unit: Count

  AuthEventTriggeredOnAlreadyDeletingAccountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            AuthEventTriggeredOnAlreadyDeletingAccountAlarm,
          ],
        ]
      AlarmDescription: Triggers when an auth event is processed for an account that is already in the deleting state.
      MetricName: AuthEventTriggeredOnAlreadyDeletingAccountCount
      Namespace: !Ref SystemTagValue
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      ActionsEnabled: true
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  UpdateInactiveAccountTrackerFunctionSuccessRate:
