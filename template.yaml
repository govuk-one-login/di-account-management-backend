                  EnvironmentConfiguration,
                  !Ref Environment,
                  zendeskTicketFormIdSecretArn,
                ]

  CreateSupportTicketLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn:
        Ref: SuspiciousActivityTopic
      FunctionName: !Join [":", [!GetAtt CreateSupportTicketFunction.Arn, live]]

  CreateSupportTicketFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-create-support-ticket"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  CreateSupportTicketToTxMACSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref CreateSupportTicketFunctionLogGroup

  CreateSupportTicketFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            CreateSupportTicketFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref CreateSupportTicketFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref CreateSupportTicketFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ######################
  # Trigger Report Suspicious Activity Step Function
  ######################

  TriggerSuspiciousActivityStepSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint:
        !Join [":", [!GetAtt TriggerSuspiciousActivityStepFunction.Arn, live]]
      Protocol: lambda
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TriggerSuspiciousActivityStepDeadLetterQueue.Arn
      TopicArn: !Ref SuspiciousActivityTopic

  TriggerSuspiciousActivityStepDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  TriggerSuspiciousActivityStepDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            TriggerSuspiciousActivityStepDeadLetterQueue,
          ],
        ]
      AlarmDescription: More than 10 suspicious activity report StepFunctions have failed to be triggered in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt TriggerSuspiciousActivityStepDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/HighAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  TriggerSuspiciousActivityStepFunctionLambdaExecutionRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: TriggerSuspiciousActivityStepFunctionLambdaExecutionRetry
      AlarmDescription: More than 10 retries of the lambda that starts the report suspicious activity StepFunction have been attempted in the last 5 minutes.
      Namespace: AWS/States
      MetricName: RetryAttempts
      Dimensions:
        - Name: StateMachineArn
          Value: !Ref ReportSuspiciousActivityStepFunction
      ComparisonOperator: GreaterThanThreshold
      Statistic: Sum
      Period: 300
      Threshold: 10
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/HighAlertNotificationTopic/ARN}}"

  TriggerSuspiciousActivityStepFunction:
    DependsOn:
      - TriggerSuspiciousActivityStepFunctionLogGroup
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-trigger-step
      CodeUri: src
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt TriggerSuspiciousActivityStepDeadLetterQueue.Arn
      Handler: trigger-rsa-step.handler
      PackageType: Zip
      Role: !GetAtt TriggerSuspiciousActivityStepRole.Arn
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref ReportSuspiciousActivityStepFunction
          STEP_FUNCTION_ALIAS: "latest"
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref TriggerSuspiciousActivityStepFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - trigger-rsa-step.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  TriggerSuspiciousActivityStepRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - !Ref TriggerSuspiciousActivityStepPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  TriggerSuspiciousActivityStepPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt TriggerSuspiciousActivityStepDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey"
            Resource:
              - !GetAtt SecretsKmsKey.Arn
          - Effect: Allow
            Action:
              - "states:StartExecution"
            Resource:
              - !GetAtt ReportSuspiciousActivityStepFunction.Arn

  TriggerSuspiciousActivityStepLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn:
        Ref: SuspiciousActivityTopic
      FunctionName:
        !Join [":", [!GetAtt TriggerSuspiciousActivityStepFunction.Arn, live]]

  TriggerSuspiciousActivityStepFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-trigger-rsa"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  TriggerSuspiciousActivityStepToTxMACSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref TriggerSuspiciousActivityStepFunctionLogGroup

  TriggerSuspiciousActivityStepDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            TriggerSuspiciousActivityStepDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt TriggerSuspiciousActivityStepDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  TriggerSuspiciousActivityStepFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            TriggerSuspiciousActivityStepFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref TriggerSuspiciousActivityStepFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref TriggerSuspiciousActivityStepFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ######################
  # Report Suspicious Activity Step Function
  ######################

  ReportSuspiciousActivityStepFunction:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${AWS::StackName}-ReportSuspiciousActivityStepFunction"
      DefinitionUri: report-suspicious-activity-asl.json
      DefinitionSubstitutions:
        ACTIVITY_LOG_TABLE_NAME: !Ref ActivityLogsStoreTableName
        MarkActivityReportedFunctionName: !Ref MarkActivityReportedFunction
        CreateZendeskTicketFunctionName: !Ref CreateSupportTicketFunction
        SendAcknowledgeFunctionName: !Ref SendConfEmailFunction
        SendToTxMAFunctionName: !Ref SendSuspiciousActivityFunction
      Role: !GetAtt ReportSuspiciousActivityStepFunctionRole.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt ReportSuspiciousActivityStepFunctionLogGroup.Arn
        Level: "ALL"
        IncludeExecutionData: false
      Tracing:
        Enabled: true
      Tags:
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
    DependsOn: ReportSuspiciousActivityStepFunctionPolicy

  ReportSuspiciousActivityStepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: !Sub "states.${AWS::Region}.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  ReportSuspiciousActivityStepFunctionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Action:
              - "lambda:InvokeFunction"
            Resource:
              - !GetAtt CreateSupportTicketFunction.Arn
              - !GetAtt SendConfEmailFunction.Arn
              - !GetAtt SendSuspiciousActivityFunction.Arn
              - !GetAtt MarkActivityReportedFunction.Arn
          - Effect: "Allow"
            Action:
              - "xray:PutTraceSegments"
              - "xray:PutTelemetryRecords"
              - "xray:GetSamplingRules"
              - "xray:GetSamplingTargets"
            Resource: "*"
          - Effect: Allow
            Action:
              - "logs:CreateLogDelivery"
              - "logs:GetLogDelivery"
              - "logs:UpdateLogDelivery"
              - "logs:DeleteLogDelivery"
              - "logs:ListLogDeliveries"
              - "logs:PutLogEvents"
              - "logs:PutResourcePolicy"
              - "logs:DescribeResourcePolicies"
              - "logs:DescribeLogGroups"
            Resource: "*"
          - Effect: Allow
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey"
            Resource:
              - !GetAtt SecretsKmsKey.Arn
      Roles:
        - !Ref ReportSuspiciousActivityStepFunctionRole

  ReportSuspiciousActivityStepFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-rsa-step"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  ReportSuspiciousActivityStepFunctionCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref ReportSuspiciousActivityStepFunctionLogGroup

  ReportSuspiciousActivityStepFunctionExecutionFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ReportSuspiciousActivityStepFunctionExecutionFailure
      AlarmDescription: More than 1 report suspicious activity StepFunction workflows have failed in the last 5 minutes.
      Namespace: AWS/States
      Statistic: Sum
      MetricName: ExecutionFailed
      Dimensions:
        - Name: StateMachineArn
          Value: !Ref ReportSuspiciousActivityStepFunction
      ComparisonOperator: GreaterThanThreshold
      Threshold: 1
      EvaluationPeriods: 1
      Period: 300
      TreatMissingData: missing
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/HighAlertNotificationTopic/ARN}}"

  ReportSuspiciousActivityStepFunctionExecutionRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ReportSuspiciousActivityStepFunctionExecutionRetry
      AlarmDescription: More than 10 attempts to retry failed report suspicious activity StepFunctions in the last 5 minutes.
      Namespace: AWS/States
      MetricName: RetryAttempts
      Dimensions:
        - Name: StateMachineArn
          Value: !Ref ReportSuspiciousActivityStepFunction
      ComparisonOperator: GreaterThanThreshold
      Statistic: Sum
      Period: 300
      Threshold: 10
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/HighAlertNotificationTopic/ARN}}"

  ReportSuspiciousActivityStepFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            ReportSuspiciousActivityStepFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref ReportSuspiciousActivityStepFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref ReportSuspiciousActivityStepFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #######################
  # Canary Deployment
  #######################

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codedeploy.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      PermissionsBoundary:
        !If [
          UsePermissionsBoundary,
          !Ref PermissionsBoundary,
          !Ref AWS::NoValue,
        ]

  #######################
  # Test permissons
  #######################

  WriteActivityLogFunctionTestPolicy:
    Condition: GrantTestPermissions
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Join [":", [!Ref WriteActivityLogFunction, live]]
      Principal: !Ref TestRoleArn

  DeleteActivityLogFunctionTestPolicy:
    Condition: GrantTestPermissions
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Join [":", [!Ref DeleteActivityLogFunction, live]]
      Principal: !Ref TestRoleArn

  #######################
  # Encryption
  #######################

  QueueKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource:
              - "*"
          - Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: kms:*
            Resource:
              - "*"
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource:
              - "*"

  QueueKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/QueueKmsKey"
      TargetKeyId: !Ref QueueKmsKey

  QueueKmsKeyArnSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The Arn of the QueueKmsKey Key
      Name: !Sub "/${AWS::StackName}/KMS/QueueKmsKey/ARN"
      Type: String
      Value: !GetAtt QueueKmsKey.Arn

  DatabaseKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - kms:*
            Resource:
              - "*"

  DatabaseKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/DatabaseKmsKey"
      TargetKeyId: !Ref DatabaseKmsKey

  DatabaseKmsKeyIDParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ID of the Database KMS Key
      Name: !Sub "/${AWS::StackName}/KMS/DatabaseKmsKey/ID"
      Type: String
      Value: !Ref DatabaseKmsKey

  LambdaKMSKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - "kms:*"
            Resource:
              - "*"
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action:
              - "kms:Decrypt"
            Resource: "*"

  LambdaKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/LambdaKMSKey"
      TargetKeyId: !Ref LambdaKMSKey

  LoggingKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"

  LoggingKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/LoggingKmsKey"
      TargetKeyId: !Ref LoggingKmsKey

  SnsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource:
              - "*"
          - !If
            - "IsNotDevelopmentOrDemo"
            - Effect: Allow
              Principal:
                AWS: !Join
                  - ""
                  - - "arn:aws:iam::"
                    - !FindInMap [
                        AccountInterventionsService,
                        !Ref Environment,
                        "AccountNumber",
                      ]
                    - ":root"
              Action: kms:Decrypt
              Resource:
                - "*"
            - !Ref AWS::NoValue
          - !If
            - "UseExternalEvents"
            - Effect: Allow
              Principal:
                AWS: !Join
                  - ""
                  - - "arn:aws:iam::"
                    - !FindInMap [
                        OrchestrationAccounts,
                        !Ref Environment,
                        "AccountNumber",
                      ]
                    - ":root"
              Action:
                - kms:Decrypt
                - kms:Encrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
              Resource:
                - "*"
            - !Ref AWS::NoValue
          - !If
            - "UseExternalEvents"
            - Effect: Allow
              Principal:
                AWS: !Join
                  - ""
                  - - "arn:aws:iam::"
                    - !FindInMap [
                        AuthenticationAccounts,
                        !Ref Environment,
                        "AccountNumber",
                      ]
                    - ":root"
              Action:
                - kms:Decrypt
                - kms:Encrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
              Resource:
                - "*"
            - !Ref AWS::NoValue
          - Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: kms:*
            Resource:
              - "*"
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: kms:*
            Resource:
              - "*"

  SnsKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/SnsKmsKey"
      TargetKeyId: !Ref SnsKmsKey

  SnsKmsKeyIDParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ID of the SNS KMS Key
      Name: !Sub "/${AWS::StackName}/KMS/SnsKmsKey/ID"
      Type: String
      Value: !Ref SnsKmsKey

  WrapperKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: A key used to encrypt the data key for envelope encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "Allow IAM to manage access to the key"
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"
        - Key: Name
          Value: !Sub "${AWS::StackName}-BackupWrapperKey"

  WrapperKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-WrapperKey"
      TargetKeyId: !GetAtt WrapperKey.Arn

  GeneratorKey:
    Type: AWS::KMS::Key
    Properties:
      Description: A generator key for generating a plaintext data key
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "Allow root account access"
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "kms:*"
            Resource: "*"
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"
        - Key: Name
          Value: !Sub "${AWS::StackName}-GeneratorKey"

  GeneratorKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-GeneratorKey"
      TargetKeyId: !GetAtt GeneratorKey.Arn

  SecretsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS key used to protect secrets data in ${AWS::StackName}"
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: "secretsmanager.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/Config/Session/Secret"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub "${AWS::StackName}-SecretsKmsKey"
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  SecretsKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-SecretsKmsKey"
      TargetKeyId: !GetAtt SecretsKmsKey.Arn

  StorageVerificationSecret:
    Type: AWS::SecretsManager::Secret
    DependsOn: SecretsKmsKeyAlias
    Properties:
      Name: !Sub "/${AWS::StackName}/Config/Storage/VerificationSecret"
      Description: Encryption context secret value
      GenerateSecretString:
        ExcludeLowercase: false
        ExcludeNumbers: false
        ExcludePunctuation: true
        ExcludeUppercase: false
        IncludeSpace: false
        RequireEachIncludedType: true
        PasswordLength: 32
      KmsKeyId: !Sub "alias/${AWS::StackName}-SecretsKmsKey"
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"
        - Key: Name
          Value: !Sub "${AWS::StackName}-GeneratorKey"

  StorageSecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      BlockPublicPolicy: false
      SecretId: !Ref StorageVerificationSecret
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: secretsmanager:GetSecretValue # pragma: allowlist secret
            Resource: !Ref StorageVerificationSecret
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: secretsmanager:GetSecretValue
            Resource: !Ref StorageVerificationSecret
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:iam::${AWS::AccountId}:role/${AccountManagementFrontendStackName}-TaskRole

  BackupWrappingKeyArnSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: "The ARN of the Wrapping KMS key in the backup account manually set with the Backup Stack's WrappingKeyArn"
      Name: !Sub "/${AWS::StackName}/${Environment}/Backup/KMS/WrappingKey/ARN"
      Type: String
      Value: "please-set-me"

  VPCFlowLogsSplunkSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName:
        Fn::ImportValue:
          Fn::Sub: "${VpcStackName}-FlowLogLogGroup"

  SuspiciousActivityTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SuspiciousActivityTopic
      KmsMasterKeyId: !Ref SnsKmsKey
      TopicName: SuspiciousActivity

  SuspiciousActivityTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SuspiciousActivityTopic
      PolicyDocument:
        Statement:
          - Sid: AllowSubscription
            Effect: Allow
            Principal:
              AWS: "*"
            Action: sns:Subscribe
            Resource:
              - !Ref SuspiciousActivityTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: AllowPublish
            Effect: Allow
            Principal:
              AWS: "*"
            Action: sns:Publish
            Resource: !Ref SuspiciousActivityTopic
            Condition:
              ArnEquals:
                aws:SourceArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${AccountManagementFrontendStackName}-TaskRole"

  SuspiciousActivityArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ARN of the Suspicious Activity Topic
      Name: !Sub "/${AWS::StackName}/SNS/SuspiciousActivity/ARN"
      Type: String
      Value: !Ref SuspiciousActivityTopic

  #### Gov Notify Notifications
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-NotificationQueue"
      MessageRetentionPeriod: 1209600
      DelaySeconds: 0
      VisibilityTimeout: 15
      ReceiveMessageWaitTimeSeconds: 0
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
      RedriveAllowPolicy:
        redrivePermission: denyAll
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDLQ.Arn
        maxReceiveCount: 5

  NotificationQueueUrlSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The URL of the NotificationQueue Queue
      Name: !Sub "/${AWS::StackName}/SQS/NotificationQueue/URL"
      Type: String
      Value: !GetAtt NotificationQueue.QueueUrl

  NotificationQueueArnSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ARN of the NotificationQueue Queue
      Name: !Sub "/${AWS::StackName}/SQS/NotificationQueue/ARN"
      Type: String
      Value: !GetAtt NotificationQueue.Arn

  NotificationQueueProcessingTooSlow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      AlarmDescription: !Sub "Notification queue processing too slow."
      ComparisonOperator: GreaterThanThreshold
      Threshold: 600
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt NotificationQueue.QueueName
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Period: 60
      Statistic: Maximum

  NotificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-NotificationDLQ"
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
      VisibilityTimeout: 0
      MessageRetentionPeriod: 1209600
      RedriveAllowPolicy:
        redrivePermission: byQueue
        sourceQueueArns:
          - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${AWS::StackName}-NotificationQueue"

  NotificationDLQHasMessages:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      AlarmDescription: !Sub "Notification DLQ has messages."
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Threshold: 1
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt NotificationDLQ.QueueName
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Period: 60
      Statistic: Maximum

  ######################
  # Notification Service
  ######################

  NotificationServiceFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - NotificationServiceFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-notification-service
      CodeUri: src
      PackageType: Zip
      Timeout: 10
      MemorySize: 256
      Events:
        NotificationQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Handler: notification-service.handler
      Role: !GetAtt NotificationServiceRole.Arn
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps
          NOTIFY_API_KEY: /account-mgmt-backend/notify-api-key
          NOTIFY_TEMPLATE_IDS:
            !FindInMap [
              EnvironmentVariables,
              !Ref Environment,
              NOTIFYTEMPLATEIDS,
            ]
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref NotificationServiceFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - notification-service.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  NotificationServiceRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref NotificationServicePolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  NotificationServicePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt NotificationQueue.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: !GetAtt QueueKmsKey.Arn
          - Effect: Allow
            Action:
              - "kms:Decrypt"
            Resource:
              - !GetAtt SecretsKmsKey.Arn
          - Effect: Allow
            Action: secretsmanager:GetSecretValue # pragma: allowlist secret
            Resource:
              - !FindInMap [
                  EnvironmentConfiguration,
                  !Ref Environment,
                  notifyApiKeySecretArn,
                ]

  NotificationServiceFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-notification-service"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  NotificationServiceCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref NotificationServiceFunctionLogGroup

  NotificationServiceFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            NotificationServiceFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref NotificationServiceFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref NotificationServiceFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #######################
  # Analyse Activity Log
  #######################

  AnalyseActivityLogFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - AnalyseActivityLogFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-analyse-activity-log
      CodeUri: src
      PackageType: Zip
      Timeout: 900
      MemorySize: 6144
      Handler: analyse-activity-log/handler.handler
      Role: !GetAtt AnalyseActivityLogRole.Arn
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps --max-old-space-size=5120
          TABLE_NAME: !Ref ActivityLogsStoreTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - analyse-activity-log/handler.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  AnalyseActivityLogRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref AnalyseActivityLogPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  AnalyseActivityLogPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:Scan
            Resource:
              - !GetAtt UserActivityLogsStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource:
              - !GetAtt DatabaseKmsKey.Arn
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Environment}-${AWS::StackName}-analyse-activity-log

  AnalyseActivityLogFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-analyse-activity-log"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  ################################################
  # Query and Dispatch Inactive Accounts
  ################################################

  QueryAndDispatchInactiveAccountsFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - QueryAndDispatchInactiveAccountsFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-inactive-accounts-processor
      CodeUri: src
      PackageType: Zip
      Timeout: 60
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: "rate(1 day)"
            Input: '{"daysToDeletion": 30, "processName": "sendNotification"}'
            Enabled: !If [IsNotDevelopmentOrDemo, true, false]
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt QueryAndDispatchInactiveAccountsDeadLetterQueue.Arn
      Handler: query-and-dispatch-inactive-accounts.handler
      Role: !GetAtt QueryAndDispatchInactiveAccountsRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref InactveAccountTrackerStoreTableName
          WARNING_30_DAY_NOTIFICATION_QUEUE_URL: !Ref 30DayNotificationQueue
          WARNING_7_DAY_NOTIFICATION_QUEUE_URL: !Ref 7DayNotificationQueue
          ACCOUNT_DELETION_QUEUE_URL: !Ref AccountDeletionQueue
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref QueryAndDispatchInactiveAccountsFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - query-and-dispatch-inactive-accounts.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  QueryAndDispatchInactiveAccountsRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref QueryAndDispatchInactiveAccountsPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  QueryAndDispatchInactiveAccountsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource:
              - !GetAtt QueryAndDispatchInactiveAccountsDeadLetterQueue.Arn
              - !GetAtt AccountSavedNotificationQueue.Arn
              - !GetAtt 30DayNotificationQueue.Arn
              - !GetAtt 7DayNotificationQueue.Arn
              - !GetAtt AccountDeletionQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:Query
            Resource:
              - !GetAtt InactiveAccountTrackerStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource:
              - !GetAtt DatabaseKmsKey.Arn
          - Effect: Allow
            Action:
              - kms:GenerateDataKey*
            Resource:
              - !GetAtt QueueKmsKey.Arn

  QueryAndDispatchInactiveAccountsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-inactive-accounts-processor"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  QueryAndDispatchInactiveAccountsCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref QueryAndDispatchInactiveAccountsFunctionLogGroup

  QueryAndDispatchInactiveAccountsDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  QueryAndDispatchInactiveAccountsDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            QueryAndDispatchInactiveAccountsDeadLetterQueueAlarm,
          ],
        ]
      AlarmDescription: More than 1 query and dispatch of inactive accounts failed in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt QueryAndDispatchInactiveAccountsDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  QueryAndDispatchInactiveAccountsDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            QueryAndDispatchInactiveAccountsDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt QueryAndDispatchInactiveAccountsDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  QueryAndDispatchInactiveAccountsFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            QueryAndDispatchInactiveAccountsFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryAndDispatchInactiveAccountsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryAndDispatchInactiveAccountsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

Outputs:
  GeneratorKey:
    Description: A generator key for generating a plaintext data key
    Value: !GetAtt GeneratorKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GeneratorKey"
  WrappingKey:
    Description: A key used to encrypt the data key for envelope encryption
    Value: !GetAtt WrapperKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WrappingKey"

# NOTES
#
# Note 1: Inert DeadLetterQueue property on SQS-triggered Lambdas
#
# The SAM DeadLetterQueue property (Lambda DeadLetterConfig) only applies to
# asynchronous invocations. SQS event source mappings invoke Lambda synchronously,
# so this property has no effect. The actual DLQ mechanism is the RedrivePolicy
# on the source queue (e.g. UserServicesToFormatQueue, UserServicesToWriteQueue,
# ActivityLogToWriteQueue).
#
# It cannot be removed because DeploymentPreference (canary deploys) publishes
# Lambda versions. CloudFormation requires all versions referenced by the alias
# to have the same DeadLetterConfig. Removing it causes:
# "Specified versions must be configured with the same DLQ target"
#
# The associated sqs:SendMessage permissions on the DLQ ARNs are also retained
# for the same reason - SAM validates the role has SendMessage on the DLQ target.
#
# This could be removed in the future with a temporary removal of canary deployments.
#
# References:
# - https://docs.aws.amazon.com/lambda/latest/api/API_DeadLetterConfig.html
# - https://docs.aws.amazon.com/lambda/latest/dg/with-sqs.html
# - #1057, #1059, #1060
