      Timeout: 30
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: Lambda
            Destination: !GetAtt DeleteEmailSubscriptionsDeadLetterQueue.Arn
        MaximumRetryAttempts: 2
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt DeleteEmailSubscriptionsDeadLetterQueue.Arn
      Environment:
        Variables:
          GOV_ACCOUNTS_PUBLISHING_API_TOKEN: !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:::${SecretId}}}"
            - SecretArn:
                !FindInMap [
                  EnvironmentConfiguration,
                  !Ref Environment,
                  publishingApiKeyArn,
                ]
              SecretId:
                !FindInMap [
                  EnvironmentConfiguration,
                  !Ref Environment,
                  publishingApiKeyVersionId,
                ]
          GOV_ACCOUNTS_PUBLISHING_API_URL:
            !FindInMap [
              EnvironmentVariables,
              !Ref Environment,
              GOVACCOUNTSPUBLISHINGAPIURL,
            ]
          NODE_OPTIONS: --enable-source-maps
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - delete-email-subscriptions.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  DeleteEmailSubscriptionsDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  DeleteEmailSubscriptionsRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref DeleteEmailSubscriptionsPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  DeleteEmailSubscriptionsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt DeleteEmailSubscriptionsDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt LoggingKmsKey.Arn
              - !GetAtt LambdaKMSKey.Arn

  DeleteEmailSubscriptionsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DeleteEmailSubscriptionsFunction}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  DeleteEmailSubscriptionsCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref DeleteEmailSubscriptionsFunctionLogGroup

  ActivityLogToFormatQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  DeleteEmailSubscriptionsDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            DeleteEmailSubscriptionsDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeleteEmailSubscriptionsDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ActivityLogToFormatQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            ActivityLogToFormatQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ActivityLogToFormatQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  DeleteEmailSubscriptionsFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            DeleteEmailSubscriptionsFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref DeleteEmailSubscriptionsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref DeleteEmailSubscriptionsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ###################
  # Write Activity Log
  ###################

  WriteActivityLogFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - WriteActivityLogFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-write-activity-log
      CodeUri: src
      PackageType: Zip
      Timeout: 30
      MemorySize: 250
      Events:
        ActivityLogToWriteQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt ActivityLogToWriteQueue.Arn
      # Why is DeadLetterQueue here? See Note 1 at the bottom of this template.
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt WriteActivityLogDeadLetterQueue.Arn
      Handler: write-activity-log.handler
      Role: !GetAtt WriteActivityRecordRole.Arn
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref ActivityLogsStoreTableName
          GENERATOR_KEY_ARN: !GetAtt GeneratorKey.Arn
          WRAPPING_KEY_ARN: !GetAtt WrapperKey.Arn
          BACKUP_WRAPPING_KEY_ARN: !GetAtt BackupWrappingKeyArnSSM.Value
          VERIFY_ACCESS_VALUE: !Sub "{{resolve:secretsmanager:/${AWS::StackName}/Config/Storage/VerificationSecret}}"
          ACCOUNT_ID: !Sub "${AWS::AccountId}"
          ENVIRONMENT: !Ref Environment
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref WriteActivityLogFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - write-activity-log.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  WriteActivityLogDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  WriteActivityRecordRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref WriteActivityRecordPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  WriteActivityRecordPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt ActivityLogToWriteQueue.Arn
          # Why is sqs:SendMessage here? See Note 1 at the bottom of this template.
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt WriteActivityLogDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource:
              - !GetAtt UserActivityLogsStore.Arn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt UserActivityLogsStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn
          - Effect: Allow
            Action:
              - "kms:GenerateDataKey"
            Resource:
              - !GetAtt GeneratorKey.Arn
          - Effect: Allow
            Action:
              - kms:Encrypt
            Resource:
              - !GetAtt WrapperKey.Arn
              - !GetAtt BackupWrappingKeyArnSSM.Value

  WriteActivityLogFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-write-activity-log"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  WriteActivityLogCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref WriteActivityLogFunctionLogGroup

  WriteActivityLogDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteActivityLogDeadLetterQueueAlarm,
          ],
        ]
      AlarmDescription: More than 1 activity log write failed in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt WriteActivityLogDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  WriteActivityLogDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteActivityLogDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WriteActivityLogDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  WriteActivityLogFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteActivityLogFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref WriteActivityLogFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref WriteActivityLogFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #######################
  # Formatting Activity Log
  #######################

  FormatActivityLogFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - FormatActivityLogFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-format-activity-log
      CodeUri: src
      PackageType: Zip
      MemorySize: 230
      Events:
        DynamoStream:
          Type: DynamoDB
          Properties:
            BatchSize: 1
            Stream: !GetAtt RawEventsStore.StreamArn
            Enabled: true
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt FormatActivityLogDeadLetterQueue.Arn
            StartingPosition: LATEST
            FilterCriteria:
              Filters:
                - Pattern: '{ "eventName": ["INSERT"] }'
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt FormatActivityLogDeadLetterQueue.Arn
      Handler: format-activity-log.handler
      Role: !GetAtt FormatActivityLogRole.Arn
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          OUTPUT_QUEUE_URL: !Ref ActivityLogToWriteQueue
          ENVIRONMENT: !Ref Environment
          ACCOUNT_ID: !Sub "${AWS::AccountId}"
          GENERATOR_KEY_ARN: !GetAtt GeneratorKey.Arn
          WRAPPING_KEY_ARN: !GetAtt WrapperKey.Arn
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref FormatActivityLogFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - format-activity-log.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  FormatActivityLogDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  FormatActivityLogRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref FormatActivityLogPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  FormatActivityLogPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt ActivityLogToFormatQueue.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt FormatActivityLogDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt ActivityLogToWriteQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource:
              - !GetAtt RawEventsStore.StreamArn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt RawEventsStore.StreamArn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource:
              - !GetAtt WrapperKey.Arn
              - !GetAtt GeneratorKey.Arn

  FormatActivityLogFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-format-activity-log"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  FormatActivityLogCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref FormatActivityLogFunctionLogGroup

  ActivityLogToWriteQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WriteActivityLogDeadLetterQueue.Arn
        maxReceiveCount: 5
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  FormatActivityLogDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatActivityLogDeadLetterQueueAlarm,
          ],
        ]
      AlarmDescription: More than 1 activity log failed to be formatted in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt FormatActivityLogDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  FormatActivityLogDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatActivityLogDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FormatActivityLogDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ActivityLogToWriteQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            ActivityLogToWriteQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ActivityLogToWriteQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  FormatActivityLogFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatActivityLogFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref FormatActivityLogFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref FormatActivityLogFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  FormatActivityLogConsoleWarningsFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: "WARN"
      LogGroupName: !Ref FormatActivityLogFunctionLogGroup
      MetricTransformations:
        - MetricName: FormatActivityLogWarningsCount
          MetricNamespace: !Ref SystemTagValue
          MetricValue: 1
          Unit: Count

  FormatActivityLogConsoleWarningsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatActivityLogConsoleWarningsAlarm,
          ],
        ]
      AlarmDescription: Triggers when the Lambda function logs console warnings.
      MetricName: FormatActivityLogWarningsCount
      Namespace: !Ref SystemTagValue
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      ActionsEnabled: true
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #########################################
  # Update Inactive Account Tracker
  #########################################

  UpdateInactiveAccountTrackerFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - UpdateInactiveAccountTrackerFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-update-inactive-account-tracker
      CodeUri: src
      PackageType: Zip
      Events:
        DynamoStream:
          Type: DynamoDB
          Properties:
            BatchSize: 1
            Stream: !GetAtt RawEventsStore.StreamArn
            Enabled: !If [IsDevelopment, true, false]
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt UpdateInactiveAccountTrackerDeadLetterQueue.Arn
            StartingPosition: LATEST
            FilterCriteria:
              Filters:
                - Pattern: '{ "eventName": ["INSERT"] }'
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt UpdateInactiveAccountTrackerDeadLetterQueue.Arn
      Handler: update-inactive-account-tracker.handler
      Role: !GetAtt UpdateInactiveAccountTrackerRole.Arn
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps
          ACCOUNT_SAVED_NOTIFICATION_QUEUE_URL: !Ref AccountSavedNotificationQueue
          INACTIVE_ACCOUNT_TRACKER_TABLE_NAME: !Ref InactveAccountTrackerStoreTableName
          USER_NOTIFICATIONS_TABLE_NAME: !Ref UserNotificationsTableName
          OLH_CLIENT_ID:
            !FindInMap [
              EnvironmentVariables,
              !Ref Environment,
              OLHCLIENTID,
            ]
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref UpdateInactiveAccountTrackerFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - update-inactive-account-tracker.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  UpdateInactiveAccountTrackerDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  AccountSavedNotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  30DayNotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  7DayNotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
