      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            AccountSavedNotificationQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AccountSavedNotificationQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

