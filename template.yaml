            Resource:
              - !GetAtt UpdateInactiveAccountTrackerDeadLetterQueue.Arn
              - !GetAtt AccountSavedNotificationQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource:
              - !GetAtt RawEventsStore.StreamArn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt RawEventsStore.StreamArn
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:DeleteItem
              - dynamodb:PutItem
              - dynamodb:Query
            Resource:
              - !GetAtt InactiveAccountTrackerStore.Arn
              - !Sub "${InactiveAccountTrackerStore.Arn}/index/CommonSubjectIdIndex"
