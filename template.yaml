Resources:
  ######################################
  # Dummy events store
  ######################################

  DummyEventStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref DummyEventStoreTableName
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"

  ######################################
  # Raw events store
  ######################################

  RawEventsStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref RawEventsStoreTableName
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      TimeToLiveSpecification:
        AttributeName: remove_at
        Enabled: true
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"

  ######################################
  # User services store
  ######################################

  UserServicesStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref UserServicesStoreTableName
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructre/template.yaml"
        - Key: BackupFrequency
          Value: !If [BackupEnabled, "Bihourly", ""]
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn

  #########################
  # User Activity Log store
  #########################

  UserActivityLogsStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref ActivityLogsStoreTableName
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructre/template.yaml"
        - Key: BackupFrequency
          Value: !If [BackupEnabled, "Daily", ""]
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn

  ######################################
  # Inactive Account Tracker store
  ######################################

  InactiveAccountTrackerStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: dateForDeletion
          AttributeType: S
        - AttributeName: commonSubjectId
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: CommonSubjectIdIndex
          KeySchema:
            - AttributeName: commonSubjectId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref InactveAccountTrackerStoreTableName      
      KeySchema:
        - AttributeName: dateForDeletion
          KeyType: HASH
        - AttributeName: commonSubjectId
          KeyType: RANGE
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn

  ######################################
  # User Notifications store
  ######################################

  UserNotificationsStore:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
        - AttributeName: internalCommonSubjectId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      TableName: !Ref UserNotificationsTableName
      KeySchema:
        - AttributeName: internalCommonSubjectId
          KeyType: HASH
      Tags:
        - Key: Product
          Value: GOV.UK Sign In
        - Key: System
          Value: Account Management Backend
        - Key: Owner
          Value: govuk-accounts-tech@digital.cabinet-office.gov.uk
        - Key: Environment
          Value: !Ref "Environment"
        - Key: Source
          Value: "https://github.com/alphagov/di-account-management-backend/blob/main/infrastructure/template.yaml"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DatabaseKmsKey.Arn

  ######################################
  # TxMA Event Queue (Dummy for now)
  ######################################

  TxMAInputDummyQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  TxMAInputDummyQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            TxMAInputDummyQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt TxMAInputDummyQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ########################################
  # Output queue for audit events to TxMA
  ########################################

  AuditOutputQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !Ref AuditEncryptionKey
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 70
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AuditDeadLetterQueue.Arn
        maxReceiveCount: 5
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  AuditOutputQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AuditOutputQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              AWS: !FindInMap [TxmaAccounts, !Ref Environment, AccountNumber]
            Action:
              - sqs:ChangeMessageVisibility
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ReceiveMessage
            Resource: !GetAtt AuditOutputQueue.Arn

  AuditDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !Ref AuditEncryptionKey
      MessageRetentionPeriod: 1209600
      RedriveAllowPolicy:
        redrivePermission: allowAll
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  AuditEncryptionKey:
    Type: AWS::KMS::Key
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource:
              - "*"
          - Effect: Allow
            Principal:
              AWS: !FindInMap [TxmaAccounts, !Ref Environment, AccountNumber]
            Action: kms:Decrypt
            Resource:
              - "*"

  AuditEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/${Environment}/AuditEncryptionKey"
      TargetKeyId: !Ref AuditEncryptionKey

  AuditQueueArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ARN of the audit event output queue
      Name: !Sub "/${AWS::StackName}/SQS/AuditQueue/ARN"
      Type: String
      Value: !GetAtt AuditOutputQueue.Arn

  AuditQueueUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The URL of the audit event output queue
      Name: !Sub "/${AWS::StackName}/SQS/AuditQueue/URL"
      Type: String
      Value: !Ref AuditOutputQueue

  AuditQueueKeyArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ARN of the KMS key encrypting the audit event output queue
      Name: !Sub "/${AWS::StackName}/KMS/AuditQueueKey/ARN"
      Type: String
      Value: !GetAtt AuditEncryptionKey.Arn

  AuditOutputQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            AuditOutputQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AuditOutputQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  AuditDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            AuditDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AuditDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ######################
  # Save Raw Events
  ######################

  SaveRawEventsFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - SaveRawEventsFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-save-raw-events
      CodeUri: src
      PackageType: Zip
      MemorySize: 220
      Events:
        InputQueue:
          Type: SQS
          Properties:
            Queue: !If
              - UseInternalEvents
              - !GetAtt TxMAInputDummyQueue.Arn
              - !FindInMap [InputQueue, !Ref Environment, QueueArn]
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt SaveRawEventsDeadLetterQueue.Arn
      Handler: save-raw-events.handler
      Role: !GetAtt SaveRawEventsRole.Arn
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref RawEventsStoreTableName
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref SaveRawEventsFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - save-raw-events.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  SaveRawEventsDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  SaveRawEventsRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref SaveRawEventsPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  SaveRawEventsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !If
              - UseInternalEvents
              - !GetAtt TxMAInputDummyQueue.Arn
              - !FindInMap [InputQueue, !Ref Environment, QueueArn]
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt SaveRawEventsDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource:
              - !GetAtt RawEventsStore.Arn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt RawEventsStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn
              - !If
                - UseInternalEvents
                - !Ref AWS::NoValue
                - !FindInMap [InputQueue, !Ref Environment, KeyArn]

  SaveRawEventsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-save-raw-events"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  SaveRawEventsCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref SaveRawEventsFunctionLogGroup

  SaveRawEventsDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, SaveRawEventsDLQAlarm],
        ]
      AlarmDescription: More than 1 raw event failed to be saved in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt SaveRawEventsDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  SaveRawEventsDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            SaveRawEventsDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SaveRawEventsDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  SaveRawEventsFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            SaveRawEventsFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref SaveRawEventsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref SaveRawEventsFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  UnknownClientIdAnomalyDetector:
    Type: AWS::CloudWatch::AnomalyDetector
    Properties:
      Namespace: "account-management-backend"
      MetricName: "unknownClientIdReceived"
      Stat: Sum

  UnknownClientIdAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, UnknownClientIdAlarm],
        ]
      AlarmDescription: "Anomalous number of unknown client IDs received. Runbook: https://github.com/govuk-one-login/di-account-management-backend/blob/main/docs/runbooks/unknown-client-id-alarm.md"
      ComparisonOperator: GreaterThanUpperThreshold
      EvaluationPeriods: 1
      ThresholdMetricId: ad1
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Namespace: "account-management-backend"
              MetricName: "unknownClientIdReceived"
            Period: 86400
            Stat: Sum
        - Id: ad1
          Expression: ANOMALY_DETECTION_BAND(m1, 2)
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  ########################
  # Querying User Services
  ########################

  QueryUserServicesFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - QueryUserServicesFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-query-user-services
      CodeUri: src
      PackageType: Zip
      MemorySize: 250
      Timeout: 10
      Events:
        DynamoStream:
          Type: DynamoDB
          Properties:
            BatchSize: 1
            Stream: !GetAtt RawEventsStore.StreamArn
            Enabled: true
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt QueryUserServicesDeadLetterQueue.Arn
            StartingPosition: LATEST
            FilterCriteria:
              Filters:
                - Pattern: '{ "eventName": ["INSERT"] }'
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt QueryUserServicesDeadLetterQueue.Arn
      Handler: query-user-services.handler
      Role: !GetAtt QueryUserServicesRole.Arn
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref UserServicesStoreTableName
          OUTPUT_QUEUE_URL: !Ref UserServicesToFormatQueue
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref QueryUserServicesFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - query-user-services.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  QueryUserServicesDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  QueryUserServicesRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref QueryUserServicesPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  QueryUserServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt TxMAInputDummyQueue.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt UserServicesToFormatQueue.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt QueryUserServicesDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:GetItem
            Resource:
              - !GetAtt UserServicesStore.Arn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt UserServicesStore.Arn
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource:
              - !GetAtt RawEventsStore.StreamArn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt RawEventsStore.StreamArn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn

  QueryUserServicesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-query-user-services"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  QueryUserServicesCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref QueryUserServicesFunctionLogGroup

  UserServicesToFormatQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FormatUserServicesDeadLetterQueue.Arn
        maxReceiveCount: 5
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  QueryUserServicesDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, QueryUserServiceDLQAlarm],
        ]
      AlarmDescription: More than 1 query for user services has failed in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt QueryUserServicesDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  QueryUserServicesDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            QueryUserServicesDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt QueryUserServicesDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  UserServicesToFormatQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            UserServicesToFormatQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UserServicesToFormatQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  QueryUserServicesFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, QueryUserServicesFunction],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref QueryUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #################################
  # Formatting User Services Record
  #################################

  FormatUserServicesFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - FormatUserServicesFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-format-user-services
      CodeUri: src
      PackageType: Zip
      MemorySize: 245
      Events:
        UserServicesToFormatQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt UserServicesToFormatQueue.Arn
      # Why is DeadLetterQueue here? See Note 1 at the bottom of this template.
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt FormatUserServicesDeadLetterQueue.Arn
      Handler: format-user-services.handler
      Role: !GetAtt FormatUserServicesRole.Arn
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          OUTPUT_QUEUE_URL: !Ref UserServicesToWriteQueue
          NODE_OPTIONS: --enable-source-maps
          ENVIRONMENT: !Ref Environment
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref FormatUserServicesFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - format-user-services.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  FormatUserServicesDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  FormatUserServicesRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref FormatUserServicesPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  FormatUserServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt UserServicesToFormatQueue.Arn
          # Why is sqs:SendMessage here? See Note 1 at the bottom of this template.
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt FormatUserServicesDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt UserServicesToWriteQueue.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource: !GetAtt QueueKmsKey.Arn

  FormatUserServicesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-format-user-services"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  FormatUserServicesCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref FormatUserServicesFunctionLogGroup

  UserServicesToWriteQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WriteUserServicesDeadLetterQueue.Arn
        maxReceiveCount: 5
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  FormatDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, FormatDeadLetterQueueAlarm],
        ]
      AlarmDescription: More than 1 un-formatted user service record failed to be formatted in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt FormatUserServicesDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  FormatUserServicesDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatUserServicesDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FormatUserServicesDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  UserServicesToWriteQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            UserServicesToWriteQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UserServicesToWriteQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  FormatUserServicesFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatUserServicesFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref FormatUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref FormatUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  FormatUserServicesConsoleWarningsFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: "WARN"
      LogGroupName: !Ref FormatUserServicesFunctionLogGroup
      MetricTransformations:
        - MetricName: FormatUserServicesWarningsCount
          MetricNamespace: !Ref SystemTagValue
          MetricValue: 1
          Unit: Count

  FormatUserServicesConsoleWarningsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProduction
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            FormatUserServicesConsoleWarningsAlarm,
          ],
        ]
      AlarmDescription: Triggers when the Lambda function logs console warnings.
      MetricName: FormatUserServicesWarningsCount
      Namespace: !Ref SystemTagValue
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      ActionsEnabled: true
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  #########################
  # Write the User Services
  #########################

  WriteUserServicesFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - WriteUserServicesFunctionLogGroup
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-write-user-services
      CodeUri: src
      PackageType: Zip
      Timeout: 10
      MemorySize: 220
      Events:
        UserServicesToWriteQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt UserServicesToWriteQueue.Arn
      # Why is DeadLetterQueue here? See Note 1 at the bottom of this template.
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt WriteUserServicesDeadLetterQueue.Arn
      Handler: write-user-services.handler
      Role: !GetAtt WriteServiceRecordRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref UserServicesStoreTableName
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref WriteUserServicesFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - write-user-services.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  WriteUserServicesDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  WriteServiceRecordRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref WriteServiceRecordPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  WriteServiceRecordPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt UserServicesToWriteQueue.Arn
          # Why is sqs:SendMessage here? See Note 1 at the bottom of this template.
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt WriteUserServicesDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource:
              - !GetAtt UserServicesStore.Arn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt UserServicesStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn

  WriteUserServicesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-write-user-services"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  WriteUserServicesCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref WriteUserServicesFunctionLogGroup

  WriteUserServicesDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteUserServicesDeadLetterQueueAlarm,
          ],
        ]
      AlarmDescription: More than 1 user service record failed to be saved in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt WriteUserServicesDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  WriteUserServicesDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteUserServicesDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WriteUserServicesDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  WriteUserServicesFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            WriteUserServicesFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref WriteUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref WriteUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ##################################
  # Notification of Account Deletion
  ##################################

  UserAccountDeletionTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: UserAccountDeletionTopic
      KmsMasterKeyId: !Ref SnsKmsKey
      TopicName: UserAccountDeletion

  UserAccountDeletionTopicPolicy:
    Condition: IsNotDevelopmentOrDemo
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref UserAccountDeletionTopic
      PolicyDocument:
        Statement:
          - Sid: "Allow Account Interventions Service"
            Effect: Allow
            Principal:
              AWS: !Join
                - ""
                - - "arn:aws:iam::"
                  - !FindInMap [
                      AccountInterventionsService,
                      !Ref Environment,
                      "AccountNumber",
                    ]
                  - ":root"
            Action: sns:Subscribe
            Resource:
              - !Ref UserAccountDeletionTopic
          - !If
            - "UseExternalEvents"
            - Sid: "Allow Orchestration to publish"
              Effect: Allow
              Principal:
                AWS: !Join
                  - ""
                  - - "arn:aws:iam::"
                    - !FindInMap [
                        OrchestrationAccounts,
                        !Ref Environment,
                        "AccountNumber",
                      ]
                    - ":root"
              Action: sns:Publish
              Resource:
                - !Ref UserAccountDeletionTopic
            - !Ref AWS::NoValue
          - !If
            - "UseExternalEvents"
            - Sid: "Allow Authentication Accounts to publish"
              Effect: Allow
              Principal:
                AWS: !Join
                  - ""
                  - - "arn:aws:iam::"
                    - !FindInMap [
                        AuthenticationAccounts,
                        !Ref Environment,
                        "AccountNumber",
                      ]
                    - ":root"
              Action: sns:Publish
              Resource:
                - !Ref UserAccountDeletionTopic
            - !Ref AWS::NoValue

  DeleteTopicArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Description: The ARN of the Delete Event Topic
      Name: !Sub "/${AWS::StackName}/SNS/DeleteTopic/ARN"
      Type: String
      Value: !Ref UserAccountDeletionTopic

  ################################
  # Deleting User Services Records
  ################################

  DeleteUserServicesSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Join [":", [!GetAtt DeleteUserServicesFunction.Arn, live]]
      Protocol: lambda
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UserAccountDeletionTopicDeadLetterQueue.Arn
      TopicArn: !Ref UserAccountDeletionTopic

  DeleteUserServicesLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn:
        Ref: UserAccountDeletionTopic
      FunctionName: !Join [":", [!GetAtt DeleteUserServicesFunction.Arn, live]]

  DeleteUserServicesFunction:
    DependsOn:
      - DeleteUserServicesFunctionLogGroup
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-${AWS::StackName}-delete-user-services
      CodeUri: src
      PackageType: Zip
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt DeleteUserServicesDeadLetterQueue.Arn
      Handler: delete-user-services.handler
      Role: !GetAtt DeleteUserServicesRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref UserServicesStoreTableName
          NODE_OPTIONS: --enable-source-maps
      DeploymentPreference:
        Alarms:
          Fn::If:
            - IsNotDevelopmentOrDemo
            - - !Ref DeleteUserServicesFunctionSuccessRate
            - - !Ref AWS::NoValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - delete-user-services.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  DeleteUserServicesRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - !Ref DeleteUserServicesPolicy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"

  DeleteUserServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt DeleteUserServicesDeadLetterQueue.Arn
          - Effect: Allow
            Action:
              - dynamodb:DeleteItem
            Resource:
              - !GetAtt UserServicesStore.Arn
              - !Sub
                - "${Arn}/*"
                - Arn: !GetAtt UserServicesStore.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource:
              - !GetAtt QueueKmsKey.Arn
              - !GetAtt DatabaseKmsKey.Arn
              - !GetAtt LoggingKmsKey.Arn
              - !GetAtt LambdaKMSKey.Arn

  DeleteUserServicesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${AWS::StackName}-delete-user-services"
      RetentionInDays: 30
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  DeleteUserServicesCSLSSubscription:
    Condition: ExportLogsToSplunk
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub "{{resolve:ssm:/${Environment}/Platform/Logs/Subscription/CSLS/ARN}}"
      FilterPattern: ""
      LogGroupName: !Ref DeleteUserServicesFunctionLogGroup

  DeleteUserServicesDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  UserAccountDeletionTopicDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  UserAccountDeletionTopicDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UserAccountDeletionTopicDeadLetterQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: "sqs:SendMessage"
            Resource: !GetAtt UserAccountDeletionTopicDeadLetterQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref UserAccountDeletionTopic

  UserAccountDeletionTopicDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            UserAccountDeletionTopicDeadLetterQueueAlarm,
          ],
        ]
      AlarmDescription: More than 1 user account deletion request failed in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt UserAccountDeletionTopicDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  DeleteDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [!Ref AWS::StackName, !Ref Environment, DeleteDeadLetterQueueAlarm],
        ]
      AlarmDescription: More than 1 request to delete a users services has failed in the last 5 minutes.
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt DeleteUserServicesDeadLetterQueue.QueueName
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"
      ActionsEnabled: true

  DeleteUserServicesDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            DeleteUserServicesDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeleteUserServicesDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  UserAccountDeletionTopicDeadLetterQueueOldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            UserAccountDeletionTopicDeadLetterQueueOldestMessageAgeAlarm,
          ],
        ]
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt UserAccountDeletionTopicDeadLetterQueue.QueueName
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  DeleteUserServicesFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        !Join [
          "-",
          [
            !Ref AWS::StackName,
            !Ref Environment,
            DeleteUserServicesFunctionSuccessRate,
          ],
        ]
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref DeleteUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref DeleteUserServicesFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Sub "{{resolve:ssm:/${AlertingStackName}/SNS/LowAlertNotificationTopic/ARN}}"

  ############################
  # Delete Email Subscriptions
  ############################

  DeleteEmailSubscriptionsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint:
        !Join [":", [!GetAtt DeleteEmailSubscriptionsFunction.Arn, live]]
      Protocol: lambda
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueue.Arn
      TopicArn: !Ref UserAccountDeletionTopic

  UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt QueueKmsKey.Arn

  DeleteEmailSubscriptionsSubscriptionDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: "sqs:SendMessage"
            Resource: !GetAtt UserAccountDeletionTopicSubscriptionDeleteEmailSubscriptionsDeadLetterQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref UserAccountDeletionTopic

  DeleteEmailSubscriptionsLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn:
        Ref: UserAccountDeletionTopic
      FunctionName:
        !Join [":", [!GetAtt DeleteEmailSubscriptionsFunction.Arn, live]]

  DeleteEmailSubscriptionsFunction:
